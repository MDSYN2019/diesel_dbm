name: PR CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: pr-ci-cd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust_quality:
    name: Rust quality checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt (check)
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --all-features

  python_quality:
    name: Streamlit Python checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: streamlit_app/requirements.txt

      - name: Install dependencies
        run: pip install -r streamlit_app/requirements.txt

      - name: Syntax check Streamlit app
        run: python -m compileall streamlit_app

  dbt_compile:
    name: dbt compile gate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: dbt_fresh_segments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-postgres

      - name: Validate dbt project
        run: dbt parse --no-write-json

  package_preview:
    name: Build preview artifacts
    runs-on: ubuntu-latest
    needs: [rust_quality, python_quality, dbt_compile]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust crate (release)
        run: cargo build --release

      - name: Upload Rust binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-release-target
          path: target/release
          if-no-files-found: error
